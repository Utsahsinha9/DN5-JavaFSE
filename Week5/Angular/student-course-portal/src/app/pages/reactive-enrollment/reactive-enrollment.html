<h2>Reactive Enrollment Form</h2>

<form [formGroup]="enrollmentForm" (ngSubmit)="onSubmit()">
  <label>Student Name</label><br />
  <input type="text" formControlName="studentName" />

  <div
    *ngIf="enrollmentForm.get('studentName')?.invalid && enrollmentForm.get('studentName')?.touched"
    style="color: red"
  >
    Student Name is required.
  </div>

  <br />

  <label>Email</label><br />
  <input type="email" formControlName="studentEmail" />

  <div
    *ngIf="
      enrollmentForm.get('studentEmail')?.invalid && enrollmentForm.get('studentEmail')?.touched
    "
    style="color: red"
  >
    Enter a valid email.
  </div>

  <br />

  <label>Course ID</label><br />
  <input type="number" formControlName="courseId" />

  <div
    *ngIf="enrollmentForm.get('courseId')?.invalid && enrollmentForm.get('courseId')?.touched"
    style="color: red"
  >
    Course ID is required.
  </div>

  <br />

  <label>Preferred Semester</label><br />
  <select formControlName="preferredSemester">
    <option value="Odd">Odd</option>
    <option value="Even">Even</option>
  </select>

  <br /><br />

  <label>
    <input type="checkbox" formControlName="agreeToTerms" />
    I agree to the Terms & Conditions
  </label>

  <br /><br />

  <button type="submit" [disabled]="enrollmentForm.invalid">Submit</button>
</form>
